name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: |
      (github.event_name == 'pull_request_target' && github.event.pull_request.user.login != github.repository_owner) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, 'recheck'))
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: ".github/cla-signatures.json"
          path-to-document: "https://github.com/KERNTechnology/openkern/blob/main/CLA.md"
          branch: main
          allowlist: nice-basti,dependabot[bot],dependabot,github-actions[bot],github-actions
          custom-notsigned-prcomment: |
            Vielen Dank für deinen Beitrag! Bevor wir diesen PR mergen können, musst du den [Contributor License Agreement (CLA)](https://github.com/KERNTechnology/openkern/blob/main/CLA.md) unterzeichnen.

            Antworte mit dem folgenden Kommentar, um den CLA zu akzeptieren:

            > I have read the CLA Document and I hereby sign the CLA

          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
