name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cms

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/cms/package-lock.json

      - run: npm ci

      - name: Generate Payload types & import map
        run: |
          npx payload generate:types
          npx payload generate:importmap
        env:
          DATABASE_URI: "postgresql://localhost:5432/test"
          PAYLOAD_SECRET: "ci-test-secret-not-real"

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cms

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/cms/package-lock.json

      - run: npm ci

      - name: Run CMS unit tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    defaults:
      run:
        working-directory: packages/cms

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/cms/package-lock.json

      - run: npm ci

      - name: Generate import map
        run: npx payload generate:importmap
        env:
          DATABASE_URI: "postgresql://localhost:5432/test"
          PAYLOAD_SECRET: "ci-test-secret-not-real"

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URI: "postgresql://localhost:5432/test"
          PAYLOAD_SECRET: "ci-test-secret-not-real"
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Build OpenNext
        run: npm run build:open-next
        env:
          DATABASE_URI: "postgresql://localhost:5432/test"
          PAYLOAD_SECRET: "ci-test-secret-not-real"
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

  infra-check:
    name: Infrastructure Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/infra/pulumi/starter

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/infra/pulumi/starter/package-lock.json

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  installer-check:
    name: Installer Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Shellcheck install.sh
        run: shellcheck packages/installer/install.sh

      - name: Shellcheck deploy.sh
        run: shellcheck packages/installer/deploy.sh

      - name: Shellcheck cleanup.sh
        run: shellcheck packages/installer/cleanup.sh

      - name: Install bats-core
        run: sudo apt-get install -y bats

      - name: Run installer tests
        run: bats packages/installer/test/
